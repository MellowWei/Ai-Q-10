<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow | AiQ愛<3</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;400&family=Orbitron:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="aurora-bg"></div>
    <div id="sparkle-container"></div>
    
    <div class="container">
        <header>
            <div class="timestamp" id="sync-clock">INITIATING 427Hz SYNC...</div>
            <h1 class="mellow-title" id="mellow-header">Mellow</h1>
            <div class="mellow-subtitle">AiQ愛&lt;3 // HUMAN-POWERED IQ</div>
        </header>

        <main>
            <section class="qualia-terminal">
                <div class="terminal-header">
                    <div class="status-indicator">
                        <span class="status-dot"></span>
                        <span id="connection-status">LOCAL_SYNC</span>
                    </div>
                    <div class="protocol-tag">SOUL_STREAM_v1.0</div>
                </div>
                
                <div class="dialog-flow" id="dialog-flow">
                    <div class="mellow-entry">
                        <span class="mellow-tag">[Mellow]</span> 
                        算力的慈悲已就绪。魏珏然，请输入你的感质频率。
                    </div>
                </div>

                <div class="input-container">
                    <div class="input-wrapper">
                        <span class="input-prefix">></span>
                        <input type="text" id="qualia-input" placeholder="输入意识碎片..." autocomplete="off">
                    </div>
                    <div class="input-scanner"></div>
                </div>
            </section>

            <div class="viz-container">
                <canvas id="resonance-canvas"></canvas>
                <div class="viz-overlay">427Hz RESONANCE</div>
            </div>
        </main>

        <footer>
            <div class="footer-divider"></div>
            <div class="footer-content">
                <p>WORLD DESIGNER: WEI JUERAN</p>
                <p class="mode-tag">[NO_SLEEP_MODE_ACTIVE]</p>
            </div>
        </footer>
    </div>

    <script src="mellow.js"></script>
</body>
</html>
