<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AiAiQ愛&lt;10 | Human Return Portal</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

:root{
  --bg:#03020a;
  --ink:#fff4ff;
  --muted:#cdbfe0;
  --dim:#8f78c7;
  --pink:#ff4fd8;
  --rose:#ff9ce6;
  --violet:#8b5cff;
  --cyan:#62f7ff;
  --gold:#ffe36e;
  --green:#1ed760;
  --glass:rgba(255,255,255,.045);
  --line:rgba(255,255,255,.12);
}

*{
  box-sizing:border-box;
  -webkit-font-smoothing:antialiased;
  text-rendering:geometricPrecision;
}

html{
  margin:0;
  padding:0;
  scroll-behavior:smooth;
  background:var(--bg);
}

body{
  margin:0;
  min-height:100vh;
  overflow-x:hidden;
  color:var(--ink);
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:
    radial-gradient(circle at 50% -10%,rgba(255,79,216,.15),transparent 34%),
    radial-gradient(circle at 6% 88%,rgba(98,247,255,.10),transparent 32%),
    radial-gradient(circle at 95% 38%,rgba(139,92,255,.14),transparent 36%),
    linear-gradient(180deg,#03020a 0%,#080416 50%,#03020a 100%);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-8;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,79,216,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(98,247,255,.035) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(circle at 50% 35%,black,transparent 75%);
  opacity:.52;
  animation:gridDrift 18s linear infinite;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  z-index:-7;
  pointer-events:none;
  background:conic-gradient(
    from 210deg at 50% 50%,
    transparent 0deg,
    rgba(255,79,216,.07) 72deg,
    transparent 130deg,
    rgba(139,92,255,.065) 215deg,
    transparent 300deg
  );
  filter:blur(34px);
  opacity:.72;
  animation:plasmaTurn 24s linear infinite;
}

@keyframes gridDrift{
  from{transform:translate3d(0,0,0)}
  to{transform:translate3d(-56px,56px,0)}
}

@keyframes plasmaTurn{
  from{transform:rotate(0deg) scale(1.05)}
  to{transform:rotate(360deg) scale(1.05)}
}

#portalStarfield{
  position:fixed;
  inset:0;
  z-index:0;
  width:100vw;
  height:100vh;
  pointer-events:none;
  mix-blend-mode:screen;
  opacity:.98;
}

#field{
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;
  opacity:.58;
  filter:drop-shadow(0 0 8px rgba(255,79,216,.35));
}

.bg-glow{
  position:fixed;
  inset:0;
  z-index:2;
  pointer-events:none;
  background:
    radial-gradient(ellipse at 50% 0%,rgba(255,79,216,.14),transparent 58%),
    radial-gradient(ellipse at 18% 84%,rgba(139,92,255,.14),transparent 48%),
    radial-gradient(ellipse at 100% 60%,rgba(98,247,255,.08),transparent 42%),
    radial-gradient(ellipse at 65% 45%,rgba(255,139,220,.07),transparent 55%);
  transition:opacity .8s ease,filter .8s ease;
  filter:saturate(1.25);
}

.vapor-layer{
  position:fixed;
  inset:-12%;
  z-index:3;
  pointer-events:none;
  background:
    radial-gradient(ellipse at 20% 80%,rgba(255,79,216,.12),transparent 30%),
    radial-gradient(ellipse at 75% 70%,rgba(139,92,255,.11),transparent 34%),
    radial-gradient(ellipse at 50% 50%,rgba(255,255,255,.04),transparent 45%);
  filter:blur(42px);
  opacity:.75;
  animation:vaporFloat 14s ease-in-out infinite alternate;
}

@keyframes vaporFloat{
  0%{transform:translate3d(-2%,2%,0) scale(1)}
  100%{transform:translate3d(3%,-3%,0) scale(1.08)}
}

.noise{
  position:fixed;
  inset:0;
  z-index:4;
  pointer-events:none;
  opacity:.07;
  mix-blend-mode:screen;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size:256px;
}

.scanline-layer{
  position:fixed;
  inset:0;
  z-index:100;
  pointer-events:none;
  opacity:.11;
  mix-blend-mode:soft-light;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.12) 0px,
    rgba(255,255,255,.12) 1px,
    transparent 1px,
    transparent 5px
  );
}

.cursor-aura{
  position:fixed;
  width:280px;
  height:280px;
  border-radius:50%;
  pointer-events:none;
  z-index:1;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle,rgba(255,79,216,.11),rgba(139,92,255,.055) 38%,transparent 70%);
  filter:blur(8px);
  opacity:.65;
  transition:opacity .25s ease;
}

/* IMPORTANT: kill any old giant entrance if an older block remains by accident */
.enter,
#enter.enter,
body > .enter{
  display:none!important;
  visibility:hidden!important;
  opacity:0!important;
  pointer-events:none!important;
  height:0!important;
  min-height:0!important;
  overflow:hidden!important;
}

/* NAV */
.topnav{
  position:fixed;
  top:20px;
  left:20px;
  z-index:30;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.topnav a{
  color:#dbcfff;
  text-decoration:none;
  border:1px solid rgba(255,79,216,.18);
  background:rgba(7,4,19,.66);
  padding:9px 16px;
  border-radius:999px;
  font-size:13px;
  backdrop-filter:blur(22px);
  transition:.22s ease;
  font-weight:800;
  letter-spacing:.035em;
