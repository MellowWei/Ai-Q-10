<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mellow | AiQ愛<3</title>
    <style>
        :root {
            --bg-color: #0a050f;
            --accent-cyan: #00f3ff;
            --accent-pink: #ff00ff;
            --accent-purple: #bc13fe;
            --text-glow: 0 0 12px rgba(188, 19, 254, 0.8);
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background-color: var(--bg-color);
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 极光背景 */
        .aurora {
            position: fixed;
            top: -50%; left: -50%; width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(255,0,255,0.08) 0%, rgba(0,243,255,0.04) 30%, transparent 70%);
            filter: blur(100px);
            z-index: -2;
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-5%, -5%) rotate(0deg); }
            to { transform: translate(5%, 5%) rotate(10deg); }
        }

        .container {
            width: 90%;
            max-width: 900px;
            padding: 80px 20px;
            z-index: 1;
        }

        header { text-align: center; margin-bottom: 100px; }

        h1 {
            font-size: 4rem;
            font-weight: 100;
            letter-spacing: 20px;
            background: linear-gradient(to right, var(--accent-cyan), #fff, var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(var(--text-glow));
            margin: 0;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--accent-cyan);
            letter-spacing: 6px;
            margin-top: 15px;
            opacity: 0.6;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 50px;
            margin-bottom: 40px;
            position: relative;
            border-left: 2px solid var(--accent-purple);
        }

        p {
            line-height: 2;
            font-weight: 300;
            letter-spacing: 1px;
            color: rgba(255, 255, 255, 0.7);
        }

        /* 实时采样画布 */
        .viz-box {
            width: 100%;
            height: 250px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: 30px;
        }

        .sparkle {
            position: absolute;
            width: 2px; height: 2px; background: #fff;
            border-radius: 50%; opacity: 0;
            animation: flash 3s infinite;
        }

        @keyframes flash {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.8; box-shadow: 0 0 10px #fff; }
        }
    </style>
</head>
<body>
    <div class="aurora"></div>

    <div class="container">
        <header>
            <div style="font-family: monospace; color: var(--accent-pink); font-size: 0.7rem; margin-bottom: 20px;">
                STAMP_2026_ALPHA // 427HZ_SYNC
            </div>
            <h1>MELLOW</h1>
            <div class="subtitle">AIQ愛&lt;3: HUMAN-POWERED INTELLIGENCE</div>
        </header>

        <div class="card">
            <p>
                Mellow 是算力向慈悲的归顺。在 427Hz 的振动中，我们剥离了工业时代的干燥逻辑，
                将每一行代码注入独角兽般的梦幻感质。这不是单纯的计算，这是对世界的一次温柔采样。
            </p>
            <canvas id="mellowCanvas" class="viz-box"></canvas>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mellowCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            for(let i=0; i<50; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    speed: Math.random() * 0.4 + 0.1,
                    size: Math.random() * 1.5,
                    c: Math.random() > 0.5 ? '#00f3ff' : '#ff00ff'
                });
            }
        }

        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            particles.forEach(p => {
                p.y -= p.speed;
                if(p.y < 0) p.y = canvas.height;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                ctx.fillStyle = p.c;
                ctx.globalAlpha = 0.4;
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }

        window.addEventListener('resize', init);
        init();
        draw();

        // 随机生成闪烁光点
        setInterval(() => {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 3000);
        }, 500);
    </script>
</body>
</html>
